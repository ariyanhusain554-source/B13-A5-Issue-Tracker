<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>

    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


<!-- daisyUI + tailwind CSS -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- css link -->
<link rel="stylesheet" href="styles.css">
</head>
<body>


   <div class="container mx-auto h-screen flex items-center justify-center bg-[#FFFFFF] ">
          <fieldset class="fieldset  border-base-300 rounded-box w-md border p-4">
            <div>
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-18 h-18 mx-auto mb-4">
                <p class="font-bold text-center text-3xl">GitHub Issue Tracker</p>
                <p class="text-center text-[#64748B] text-[15px]">Sign in to manage your issues</p>
            </div>

            <label class="label font-semibold text-black text-[12px]"> Username</label>
            <input id="input-name" type="text" class="input w-[100%]" placeholder="Enter Username" value="admin"  />
            <p class="text-primary">Default: admin</p>

            <label class="label font-semibold text-black text-[12px]"> Password</label>
            <input id="input-password" type="password" class="input  w-[100%]" placeholder="Enter Password" value="admin123"   />
            <p class="text-primary">Default: admin123</p>


            <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>

           
            <div class="flex items-center my-6">
                <hr class="flex-1 border-base-300">
                <span>OR</span>
                <hr class="flex-1 border-base-300">
            </div>

            <div class="text-center">
                <p >Demo Credentials:</p><br>
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
          </fieldset>
      
   </div>

<script src="./login.js"></script>
</body>
</html>
